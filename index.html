<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Thays Moreira — Escolha o Layout</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Montserrat', sans-serif;
      background: #0d0d0d;
      color: #f8f5f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 50px;
      padding: 40px;
    }
    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 42px;
      font-weight: 300;
      color: #c9a96e;
      text-align: center;
    }
    h1 em { font-style: italic; color: #f8f5f0; }
    .sub {
      font-size: 12px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #a09080;
    }
    .botoes {
      display: flex;
      gap: 40px;
      flex-wrap: wrap;
      justify-content: center;
    }
    a {
      width: 320px;
      height: 220px;
      border: 1px solid rgba(201,169,110,.3);
      text-decoration: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      transition: all .4s;
    }
    a:hover {
      border-color: #c9a96e;
      background: rgba(201,169,110,.05);
      transform: translateY(-5px);
    }
    .label {
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #c9a96e;
    }
    .nome {
      font-family: 'Cormorant Garamond', serif;
      font-size: 32px;
      font-weight: 300;
      color: #f8f5f0;
    }
  </style>
</head>
<body>
  <div>
    <p class="sub">Thays Moreira — Bijoux & Design</p>
    <h1>Escolha o <em>layout</em></h1>
  </div>
  <div class="botoes">
    <a href="/modelo-a/">
      <span class="label">Opção 1</span>
      <span class="nome">Modelo Original</span>
    </a>
    <a href="/modelo-b/">
      <span class="label">Opção 2</span>
      <span class="nome">Novo Modelo</span>
    </a>
  </div>
</body>
</html>
